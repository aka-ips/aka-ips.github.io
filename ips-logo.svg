<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="640" height="640">
  <defs>
    <!-- 背景グラデーション：深紺 -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a3a6e"/>
      <stop offset="100%" stop-color="#0a1a3e"/>
    </radialGradient>
    <!-- ゴールドグラデーション -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d080"/>
      <stop offset="30%" stop-color="#d4af37"/>
      <stop offset="60%" stop-color="#f5e070"/>
      <stop offset="100%" stop-color="#b8960c"/>
    </linearGradient>
    <!-- 外リンググラデーション -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e070"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <!-- 光沢フィルター -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- 内側シャドウ -->
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景円 -->
  <circle cx="320" cy="320" r="320" fill="url(#bgGrad)"/>

  <!-- 外側ゴールドリング（太） -->
  <circle cx="320" cy="320" r="300" fill="none" stroke="url(#ringGrad)" stroke-width="8"/>
  <!-- 外側ゴールドリング（細・装飾） -->
  <circle cx="320" cy="320" r="285" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-dasharray="4,6"/>
  <!-- 内側ゴールドリング -->
  <circle cx="320" cy="320" r="270" fill="none" stroke="url(#ringGrad)" stroke-width="3"/>

  <!-- 上部装飾ライン -->
  <path d="M 200 145 Q 320 120 440 145" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.7"/>
  <!-- 下部装飾ライン -->
  <path d="M 200 495 Q 320 520 440 495" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.7"/>

  <!-- ダイヤモンド装飾（上） -->
  <polygon points="320,100 328,112 320,124 312,112" fill="url(#goldGrad)" filter="url(#glow)"/>
  <!-- ダイヤモンド装飾（下） -->
  <polygon points="320,516 328,528 320,540 312,528" fill="url(#goldGrad)" filter="url(#glow)"/>
  <!-- ダイヤモンド装飾（左） -->
  <polygon points="46,320 58,312 70,320 58,328" fill="url(#goldGrad)" filter="url(#glow)"/>
  <!-- ダイヤモンド装飾（右） -->
  <polygon points="570,320 582,312 594,320 582,328" fill="url(#goldGrad)" filter="url(#glow)"/>

  <!-- メインテキスト "IPS" -->
  <text x="320" y="268" 
    font-family="Georgia, 'Times New Roman', serif" 
    font-size="148" 
    font-weight="bold"
    fill="url(#goldGrad)"
    text-anchor="middle"
    letter-spacing="12"
    filter="url(#innerGlow)">IPS</text>

  <!-- 中央区切りライン -->
  <line x1="160" y1="295" x2="460" y2="295" stroke="url(#goldGrad)" stroke-width="1" opacity="0.6"/>
  <!-- 中央ダイヤ装飾 -->
  <polygon points="320,295 326,303 320,311 314,303" fill="url(#goldGrad)" opacity="0.9"/>

  <!-- サブテキスト "IT Solutions" -->
  <text x="320" y="370" 
    font-family="Georgia, 'Times New Roman', serif" 
    font-size="52" 
    font-weight="normal"
    fill="url(#goldGrad)"
    text-anchor="middle"
    letter-spacing="8">IT Solutions</text>

  <!-- 下部小テキスト -->
  <text x="320" y="430" 
    font-family="Arial, sans-serif" 
    font-size="22" 
    fill="url(#goldGrad)"
    text-anchor="middle"
    letter-spacing="5"
    opacity="0.75">AI · AUTOMATION · WEB · APP</text>

  <!-- コーナー星装飾（4点） -->
  <polygon points="195,190 199,200 209,200 201,207 204,217 195,210 186,217 189,207 181,200 191,200" fill="url(#goldGrad)" opacity="0.6" transform="scale(0.7) translate(85,90)"/>
  <polygon points="445,190 449,200 459,200 451,207 454,217 445,210 436,217 439,207 431,200 441,200" fill="url(#goldGrad)" opacity="0.6" transform="scale(0.7) translate(-95,90)"/>

  <!-- 中央グロー効果 -->
  <circle cx="320" cy="320" r="180" fill="rgba(212,175,55,0.03)"/>
</svg>
